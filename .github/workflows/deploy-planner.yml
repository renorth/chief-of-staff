name: Deploy Planner to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'planner/**'
  workflow_dispatch:   # lets you trigger manually from GitHub UI

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deploy runs at a time; cancel any in-flight run on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: planner/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: planner

      - name: Build
        run: npm run build
        working-directory: planner

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: planner/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
